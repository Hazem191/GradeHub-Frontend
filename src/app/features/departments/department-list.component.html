<section class="container py-4">
  <div class="mb-4 d-flex flex-wrap justify-content-between align-items-start gap-3">
    <div>
      <h1 class="h3 mb-1">Departments</h1>
      <p class="text-muted mb-0">Manage departments and assign courses in bulk.</p>
    </div>
    <div>
      <button class="btn btn-outline-primary" type="button" (click)="loadData()">Refresh data</button>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-xl-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Department list</h2>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>Name</th><th>Actions</th></tr>
              </thead>
              <tbody>
                <tr *ngFor="let department of departments">
                  <td>{{ department.name }}</td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary me-2" type="button" (click)="selectDepartment(department)">Manage</button>
                    <button class="btn btn-sm btn-outline-danger" type="button" (click)="deleteDepartment(department.id)">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-6">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 class="h5 mb-3">{{ selectedDepartment ? 'Edit Department' : 'Add Department' }}</h2>
          <form [formGroup]="departmentForm" (ngSubmit)="saveDepartment()">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input formControlName="name" class="form-control" placeholder="Department name" />
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">{{ selectedDepartment ? 'Update' : 'Create' }}</button>
              <button type="button" class="btn btn-outline-secondary" *ngIf="selectedDepartment" (click)="clearSelection()">Cancel</button>
            </div>
          </form>
          <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
        </div>
      </div>

      <div *ngIf="selectedDepartment" class="card shadow-sm">
        <div class="card-body">
          <h3 class="h6 mb-3">Assign / Remove Courses</h3>
          <div class="row g-3">
            <div class="col-md-6">
              <div class="mb-3">
                <h6>Available courses</h6>
                <div class="form-check" *ngFor="let course of availableCourses">
                  <input class="form-check-input" type="checkbox" [id]="'assign-' + course.id" (change)="toggleAssign(course.id, $event.target.checked)" />
                  <label class="form-check-label" [for]="'assign-' + course.id">{{ course.name }}</label>
                </div>
              </div>
              <button class="btn btn-success btn-sm" type="button" (click)="assignCourses()" [disabled]="assignCourseIds.length === 0">Assign selected</button>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <h6>Assigned courses</h6>
                <div class="form-check" *ngFor="let course of assignedCourses">
                  <input class="form-check-input" type="checkbox" [id]="'remove-' + course.id" (change)="toggleRemove(course.id, $event.target.checked)" />
                  <label class="form-check-label" [for]="'remove-' + course.id">{{ course.name }}</label>
                </div>
              </div>
              <button class="btn btn-danger btn-sm" type="button" (click)="removeCourses()" [disabled]="removeCourseIds.length === 0">Remove selected</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
