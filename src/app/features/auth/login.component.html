<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-4">Login</h1>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input formControlName="email" type="email" class="form-control" placeholder="you@example.com" />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input formControlName="password" type="password" class="form-control" placeholder="••••••••" />
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <button type="submit" class="btn btn-primary" [disabled]="loading">Login</button>
              <a routerLink="/register" class="btn btn-link">Register</a>
            </div>
          </form>
          <div class="mt-3">
            <div *ngIf="message" class="alert alert-success">{{ message }}</div>
            <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
