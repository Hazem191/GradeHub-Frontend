<section class="container py-4">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
    <div>
      <h1 class="h3 mb-1">Students</h1>
      <p class="text-muted mb-0">Manage student profiles and academic assignments.</p>
    </div>
    <div>
      <button class="btn btn-outline-primary" type="button" (click)="loadData()">Refresh data</button>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Student roster</h2>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>Name</th><th>Email</th><th>Department</th><th>Actions</th></tr>
              </thead>
              <tbody>
                <tr *ngFor="let student of students">
                  <td>{{ student.name }}</td>
                  <td>{{ student.email }}</td>
                  <td>{{ departments.find((dep) => dep.id === student.departmentId)?.name || 'Unassigned' }}</td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary me-2" type="button" (click)="selectStudent(student)">Edit</button>
                    <button class="btn btn-sm btn-outline-danger" type="button" (click)="deleteStudent(student.id)">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">{{ selectedStudent ? 'Edit Student' : 'Add Student' }}</h2>
          <form [formGroup]="studentForm" (ngSubmit)="saveStudent()">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input formControlName="name" class="form-control" placeholder="Student name" />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input formControlName="email" type="email" class="form-control" placeholder="student@example.com" />
            </div>
            <div class="mb-3">
              <label class="form-label">Department</label>
              <select formControlName="departmentId" class="form-select">
                <option value="">Select department</option>
                <option *ngFor="let department of departments" [value]="department.id">{{ department.name }}</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">{{ selectedStudent ? 'Save changes' : 'Create student' }}</button>
              <button type="button" class="btn btn-outline-secondary" *ngIf="selectedStudent" (click)="resetForm()">Cancel</button>
            </div>
          </form>
          <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
